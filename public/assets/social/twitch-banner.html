<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1200px;
        height: 480px;
        overflow: hidden;
      }

      .banner {
        width: 1200px;
        height: 480px;
        background-color: #1a1a1a;
        font-family:
          "Space Grotesk",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        padding: 0 72px;
      }

      /*
      Pink dot pattern — same as website body::after and other banners.
      Covers right 55% of the canvas.
    */
      .banner::after {
        content: "";
        position: absolute;
        top: 0;
        right: 0;
        width: 55%;
        height: 100%;
        pointer-events: none;
        background-image: radial-gradient(
          circle,
          oklch(0.65 0.25 350 / 0.75) 1.6px,
          transparent 1.6px
        );
        background-size: 16px 16px;
        mask-image: radial-gradient(
          ellipse 100% 120% at 100% 0%,
          black 30%,
          transparent 82%
        );
        -webkit-mask-image: radial-gradient(
          ellipse 100% 120% at 100% 0%,
          black 30%,
          transparent 82%
        );
      }

      /* Left content */
      .content {
        flex: 1;
        z-index: 1;
        padding-left: 12px;
      }

      .hero-heading {
        font-family:
          "Space Grotesk",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        font-size: 40px;
        font-weight: 800;
        color: #fafafa;
        line-height: 1.07;
        letter-spacing: -1.5px;
        margin-bottom: 10px;
      }

      .pink-accent {
        display: block;
        width: 36px;
        height: 3px;
        background: #f472b6;
        border-radius: 2px;
        margin-bottom: 14px;
      }

      .credentials {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        max-width: 560px;
      }

      .badge {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        font-size: 12px;
        font-weight: 500;
        color: #efefef;
        border: 1px solid rgba(255, 255, 255, 0.3);
        padding: 4px 12px;
        border-radius: 9999px;
        background: #252525;
        white-space: nowrap;
      }

      /* Brand block — right side, vertically centred */
      .brand-block {
        z-index: 1;
        text-align: right;
        flex-shrink: 0;
        padding-left: 32px;
        padding-right: 12px;
      }

      .handle {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        font-size: 13px;
        font-weight: 500;
        color: #efefef;
        margin-bottom: 6px;
      }

      .brand {
        font-family:
          "Space Grotesk",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        font-size: 26px;
        font-weight: 700;
        color: #fafafa;
        letter-spacing: -0.5px;
      }

      .brand .dot {
        color: #f472b6;
      }
    </style>
  </head>

  <body>
    <div class="banner">
      <div class="content">
        <h1 class="hero-heading">Developer. Advocate.<br />Builder.</h1>
        <div class="pink-accent"></div>
        <div class="credentials">
          <span class="badge">GitHub Star</span>
          <span class="badge">AAIF Ambassador</span>
          <span class="badge">Microsoft MVP</span>
          <span class="badge">AWS Community Builder</span>
          <span class="badge"
            >Zero Trust &nbsp;·&nbsp; Agentic AI &nbsp;·&nbsp; MCP &nbsp;·&nbsp;
            Open Source</span
          >
        </div>
      </div>
      <div class="brand-block">
        <div class="handle">@nickytonline</div>
        <div class="brand">nickyt<span class="dot">.</span>co</div>
      </div>
    </div>
  </body>
</html>
