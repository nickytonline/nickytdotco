<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1584px;
        height: 396px;
        overflow: hidden;
      }

      .banner {
        width: 1584px;
        height: 396px;
        /* Dark mode background: oklch(0.145 0 0) ≈ #1a1a1a */
        background-color: #1a1a1a;
        font-family:
          "Space Grotesk",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        display: flex;
        align-items: center;
        /* left padding clears LinkedIn's profile picture circle (~270px) */
        padding: 0 72px 0 480px;
        position: relative;
        overflow: hidden;
      }

      /*
      Dot pattern replicating body::after from global.css:
      - Right 60% of the banner
      - oklch(0.65 0.25 350 / 0.4) pink dots, 1.2px, 16px grid
      - Masked with ellipse fading from top-right
    */
      .banner::after {
        content: "";
        position: absolute;
        top: 0;
        right: 0;
        width: 62%;
        height: 100%;
        pointer-events: none;
        background-image: radial-gradient(
          circle,
          oklch(0.65 0.25 350 / 0.75) 1.6px,
          transparent 1.6px
        );
        background-size: 16px 16px;
        mask-image: radial-gradient(
          ellipse 100% 120% at 100% 0%,
          black 30%,
          transparent 82%
        );
        -webkit-mask-image: radial-gradient(
          ellipse 100% 120% at 100% 0%,
          black 30%,
          transparent 82%
        );
      }

      /* Left content block */
      .content {
        flex: 1;
        z-index: 1;
      }

      /*
      Hero heading matches site: Space Grotesk, font-extrabold (800),
      tracking-tight, text-balance
    */
      .hero-heading {
        font-family:
          "Space Grotesk",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        font-size: 68px;
        font-weight: 800;
        color: #fafafa;
        line-height: 1.07;
        letter-spacing: -2.5px;
        margin-bottom: 18px;
      }

      /* Pink underline accent — mirrors the section-header underline on the site */
      .pink-accent {
        display: block;
        width: 56px;
        height: 4px;
        background: #f472b6; /* Tailwind pink-400, used in dark mode */
        border-radius: 2px;
        margin-bottom: 22px;
      }

      /* Credential badges */
      .credentials {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        max-width: 680px;
      }

      .badge {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        font-size: 17px;
        font-weight: 500;
        color: #efefef;
        border: 1px solid rgba(255, 255, 255, 0.3);
        padding: 6px 15px;
        border-radius: 9999px;
        background: #252525;
        white-space: nowrap;
      }

      /* Brand block — bottom right, matches logo style */
      .brand-block {
        position: absolute;
        right: 72px;
        bottom: 44px;
        z-index: 1;
        text-align: right;
      }

      .handle {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        font-size: 17px;
        font-weight: 500;
        color: #efefef;
        margin-bottom: 8px;
      }

      /* Logo: "nickyt.co" with pink dot — exactly as rendered in the site header */
      .brand {
        font-family:
          "Space Grotesk",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        font-size: 36px;
        font-weight: 700;
        color: #fafafa;
        letter-spacing: -0.5px;
      }

      .brand .dot {
        color: #f472b6; /* pink-400 */
      }
    </style>
  </head>
  <body>
    <div class="banner">
      <div class="content">
        <h1 class="hero-heading">Developer. Advocate.<br />Builder.</h1>
        <div class="pink-accent"></div>
        <div class="credentials">
          <span class="badge">GitHub Star</span>
          <span class="badge">AAIF Ambassador</span>
          <span class="badge">Microsoft MVP</span>
          <span class="badge">AWS Community Builder</span>
          <span class="badge"
            >Zero Trust &nbsp;·&nbsp; Agentic AI &nbsp;·&nbsp; MCP &nbsp;·&nbsp;
            Open Source</span
          >
        </div>
      </div>
      <div class="brand-block">
        <div class="handle">@nickytonline</div>
        <div class="brand">nickyt<span class="dot">.</span>co</div>
      </div>
    </div>
  </body>
</html>
